<script>
    const xtSources = [
        { name: "JAMB/WAEC", type: "SCHOOLS", color: "#0047ba", url: "https://myschool.ng/news/rss" }, 
        { name: "UNI/POLY NEWS", type: "SCHOOLS", color: "#6a0dad", url: "https://vanguardngr.com/category/education/feed/" },
        { name: "ADMISSION LISTS", type: "SCHOOLS", color: "#cc0000", url: "https://dailypost.ng/hot-news/feed/" },
        { name: "LIVE FOOTBALL", type: "FOOTBALL", color: "#22c55e", url: "https://www.goal.com/en-ng/feeds/news" }, 
        { name: "SECURITY NEWS", type: "SECURITY", color: "#ff8c00", url: "https://prnigeria.com/category/news/feed/" }
    ];

    let masterArticles = [];

    async function initXtreme() {
        masterArticles = [];
        for (const s of xtSources) {
            try {
                const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(s.url)}`);
                const data = await response.json();
                if (data.items) {
                    data.items.forEach(item => {
                        item.xtSrc = s.name;
                        item.xtType = s.type;
                        item.xtColor = s.color;
                        masterArticles.push(item);
                    });
                }
            } catch (err) { }
        }
        masterArticles.sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));
        displayX(masterArticles);
    }

    function displayX(items) {
        const feedDiv = document.getElementById('xtreme-main');
        feedDiv.innerHTML = '';
        if(items.length === 0) {
            feedDiv.innerHTML = '<p style="text-align:center; padding:20px;">Refreshing connections...</p>';
            return;
        }
        items.slice(0, 45).forEach(a => {
            let thumb = a.thumbnail || "";
            if (!thumb && a.description) {
                const imgMatch = a.description.match(/<img[^>]+src="([^">]+)"/);
                if (imgMatch) thumb = imgMatch[1];
            }
            let mediaHtml = thumb ? `<div style="height:150px; overflow:hidden;"><img src="${thumb}" style="width:100%; height:100%; object-fit:cover;"></div>` : '';

            feedDiv.innerHTML += `
                <div class="feed-item" style="border-left-color: ${a.xtColor}">
                    <a href="${a.link}" class="feed-link" target="_blank">
                        ${mediaHtml}
                        <div class="card-content">
                            <span class="badge" style="background:${a.xtColor}">${a.xtSrc}</span>
                            <p class="headline">${a.title}</p>
                        </div>
                    </a>
                </div>`;
        });
    }

    function filterX(type, btn) {
        document.querySelectorAll('.cat').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        if(type === 'all') { displayX(masterArticles); } 
        else { displayX(masterArticles.filter(item => item.xtType === type)); }
    }

    window.onload = initXtreme;
</script>
