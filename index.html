<script>
    const xtSources = [
        { name: "PUNCH NEWS", type: "NEWS", color: "#e50914", url: "https://rss.punchng.com/v1/category/latest/" },
        { name: "VANGUARD", type: "NEWS", color: "#0047ba", url: "https://vanguardngr.com/feed/" },
        { name: "DAILY POST", type: "NEWS", color: "#ffc107", url: "https://dailypost.ng/feed/" },
        { name: "GAME NEWS", type: "GAMES", color: "#8b5cf6", url: "https://www.gamespot.com/feeds/game-news/" },
        { name: "SECURITY ALERTS", type: "SECURITY", color: "#ff8c00", url: "https://prnigeria.com/category/news/feed/" },
        { name: "WAEC/SCHOOLS", type: "WAEC", color: "#22c55e", url: "https://myschool.ng/news/rss" }, 
        { name: "NOLLYWOOD", type: "MOVIES", color: "#ffd700", url: "https://whatkeptmeup.com/category/news/feed/" }
    ];

    let allItems = [];
    let pointer = 0;
    let perPage = 15;
    let currentFilter = 'all';

    async function initXtreme() {
        allItems = [];
        for (const s of xtSources) {
            try {
                const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(s.url)}&count=50&t=${Date.now()}`);
                const data = await res.json();
                if (data.items) {
                    data.items.forEach(item => {
                        item.xtSrc = s.name;
                        item.xtType = s.type;
                        item.xtColor = s.color;
                        allItems.push(item);
                    });
                }
            } catch (e) { }
        }
        allItems.sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));
        loadMore();
    }

    function loadMore() {
        const target = currentFilter === 'all' ? allItems : allItems.filter(i => i.xtType === currentFilter);
        const nextBatch = target.slice(pointer, pointer + perPage);
        
        if (nextBatch.length === 0 && pointer > 0) {
            document.getElementById('sentinel').innerHTML = "✨ YOU HAVE FINISHED NIGERIA'S INTERNET FOR TODAY";
            return;
        }

        const main = document.getElementById('xtreme-main');
        nextBatch.forEach(a => {
            let thumb = a.thumbnail || "";
            if (!thumb && a.description) {
                const imgMatch = a.description.match(/<img[^>]+src="([^">]+)"/);
                if (imgMatch) thumb = imgMatch[1];
            }
            let media = thumb ? `<img src="${thumb}" loading="lazy" style="width:100%; height:220px; object-fit:cover;">` : '<div style="height:4px; background:var(--xt-orange); opacity:0.3;"></div>';

            main.innerHTML += `
                <div class="feed-item" style="border-left: 6px solid ${a.xtColor}">
                    <a href="${a.link}" class="feed-link" target="_blank">
                        ${media}
                        <div class="card-content">
                            <span class="badge" style="background:${a.xtColor}">${a.xtSrc}</span>
                            <p class="headline">${a.title}</p>
                        </div>
                    </a>
                </div>`;
        });
        pointer += perPage;
    }

    const observer = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting && allItems.length > 0) {
            loadMore();
        }
    }, { rootMargin: "500px" }); 

    observer.observe(document.getElementById('sentinel'));

    function filterX(type, btn) {
        document.querySelectorAll('.cat').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = type;
        pointer = 0;
        
        document.getElementById('game-highlight').style.display = (type === 'all' || type === 'GAMES') ? 'block' : 'none';
        document.getElementById('xtreme-main').innerHTML = '';
        document.getElementById('sentinel').innerHTML = "🔄 SCANNING EVERYTHING...";
        window.scrollTo(0, 0);
        loadMore();
    }

    window.onload = initXtreme;
</script>
