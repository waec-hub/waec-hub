        /* LIVE FOOTBALL TRACKER BOX */
        .live-cam-box {
            background: #111;
            margin: 10px;
            border-radius: 12px;
            border: 1px solid #333;
            overflow: hidden;

        }
        .live-header {
            background: #222;
            padding: 10px;
            font-size: 0.7rem;
            font-weight: 900;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #333;
        }
        .live-dot { height: 8px; width: 8px; background: var(--live-green); border-radius: 50%; display: inline-block; margin-right: 5px; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* CATEGORY SCROLLER */
        .cat-bar { 
            display: flex; overflow-x: auto; padding: 12px; background: #111; gap: 10px; 
            position: sticky; top: 83px; z-index: 2000; scrollbar-width: none; 
        }
        .cat-bar::-webkit-scrollbar { display: none; }
        .cat { 
            padding: 8px 20px; border-radius: 6px; font-size: 0.7rem; font-weight: 800; 
            background: #222; color: #777; white-space: nowrap; border: 1px solid #333; cursor: pointer; 
        }
        .cat.active { background: var(--xt-orange); color: white; border-color: var(--xt-orange); }

        .container { padding: 10px; max-width: 500px; margin: auto; }

        /* NEWS FEED CARDS */
        .feed-item {

            overflow: hidden; border-left: 5px solid #333;

        .feed-img-container { position: relative; width: 100%; height: 180px; background: #222; overflow: hidden; }

        .card-content { padding: 15px; }
        .badge { font-size: 0.6rem; font-weight: 900; text-transform: uppercase; padding: 4px 10px; border-radius: 4px; margin-bottom: 10px; display: inline-block; color: #fff; }

        /* BOTTOM NAV */

        .nav-item.active { color: var(--xt-orange); }
    </style>

<script>
    const xtSources = [
        { name: "GOAL NIGERIA", type: "FOOTBALL", color: "#22c55e", url: "https://www.goal.com/en-ng/feeds/news" }, 
        { name: "JAMB UPDATES", type: "EXAMS", color: "#0047ba", url: "https://myschool.ng/news/rss" }, 
        { name: "NPF NEWS", type: "POLICE", color: "#002d62", url: "https://www.npf.gov.ng/news/feed/" },
        { name: "PUNCH NEWS", type: "NATIONAL", color: "#cc0000", url: "https://punchng.com/feed/" },
        { name: "NOTJUSTOK", type: "MUSIC", color: "#8b5cf6", url: "https://notjustok.com/feed/" },
        { name: "GAMINGBOLT", type: "GAMES", color: "#10b981", url: "https://gamingbolt.com/feed" }
    ];

    let masterArticles = [];

    async function initXtreme() {
        masterArticles = [];
        for (const s of xtSources) {
            try {
                const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(s.url)}`);
                const data = await response.json();
                if (data.items) {
                    data.items.forEach(item => {
                        item.xtSrc = s.name;
                        item.xtType = s.type;
                        item.xtColor = s.color;
                        masterArticles.push(item);
                    });
                }
            } catch (err) { console.warn("Sync slow for " + s.name); }
        }
        masterArticles.sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));
        displayX(masterArticles);
    }

    function displayX(items) {
        const feedDiv = document.getElementById('xtreme-main');
        feedDiv.innerHTML = '';
        items.slice(0, 45).forEach(a => {
            let thumb = a.thumbnail || "";
            if (!thumb && a.description) {
                const imgMatch = a.description.match(/<img[^>]+src="([^">]+)"/);
                if (imgMatch) thumb = imgMatch[1];
            }
            
            let mediaHtml = thumb ? `
                <div class="feed-img-container">
                    <img src="${thumb}" class="feed-img" onerror="this.parentElement.style.display='none'">
                </div>` : '';

            feedDiv.innerHTML += `
                <div class="feed-item" style="border-left-color: ${a.xtColor}">
                    <a href="${a.link}" class="feed-link" target="_blank">
                        ${mediaHtml}
                        <div class="card-content">
                            <span class="badge" style="background:${a.xtColor}">${a.xtSrc}</span>
                            <p class="headline">${a.title}</p>
                        </div>
                    </a>
                </div>`;
        });
    }

    function filterX(type) {
        document.querySelectorAll('.cat').forEach(c => c.classList.remove('active'));
        event.target.classList.add('active');
        if(type === 'all') { displayX(masterArticles); } 
        else { displayX(masterArticles.filter(item => item.xtType === type)); }
    }

    // Auto-refresh every 5 minutes to keep news automatic
    setInterval(initXtreme, 300000);
    initXtreme();
</script>
