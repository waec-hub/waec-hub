<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XTREME HUB | Everything Nigeria</title>
    
    <script type='text/javascript' src='https://throughalivemedication.com/xhgyimzr4?key=ea45ae348b5b66abc7f9c78cb4a8bde7'></script>

    <script src="https://pl29376660.profitablecpmratenetwork.com/56/40/25/5640255b2df172766967b5fde6f55dc3.js"></script>

    <style>
        :root { --xt-orange: #ff4d00; --xt-black: #0a0a0a; --xt-gray: #121212; --xt-blue: #0047ba; --xt-police: #1a237e; --xt-wrestle: #d90429; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: #000; margin: 0; padding-bottom: 110px; color: #fff; overflow-x: hidden; }
        
        /* Fixed Header */
        .header { background: var(--xt-black); padding: 18px; text-align: center; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 3000; }
        .logo { font-size: 1.6rem; font-weight: 900; font-style: italic; text-transform: uppercase; margin: 0; letter-spacing: -1px; }
        .logo span { color: var(--xt-orange); }

        /* 📅 Slim WAEC Auto-Ticker */
        .waec-slim { background: var(--xt-blue); padding: 8px 15px; display: flex; align-items: center; justify-content: space-between; font-size: 0.75rem; font-weight: 700; border-bottom: 2px solid var(--xt-orange); position: sticky; top: 62px; z-index: 2500; }
        .waec-tag { background: #fff; color: var(--xt-blue); padding: 2px 6px; border-radius: 3px; font-size: 0.6rem; text-transform: uppercase; margin-right: 8px; }
        .waec-text { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }

        /* Category Navigation */
        .cat-bar { display: flex; overflow-x: auto; padding: 12px; background: #111; gap: 8px; position: sticky; top: 95px; z-index: 2000; scrollbar-width: none; border-bottom: 1px solid #222; }
        .cat-bar::-webkit-scrollbar { display: none; }
        .cat { padding: 8px 18px; border-radius: 20px; font-size: 0.7rem; font-weight: 800; background: #1a1a1a; color: #777; white-space: nowrap; border: 1px solid #333; cursor: pointer; transition: 0.3s; }
        .cat.active { background: var(--xt-orange); color: white; border-color: var(--xt-orange); }

        /* Main Feed */
        .container { padding: 12px; max-width: 550px; margin: auto; min-height: 100vh; }
        .feed-item { background: var(--xt-gray); margin-bottom: 18px; border-radius: 12px; overflow: hidden; border: 1px solid #222; animation: fadeIn 0.4s ease; }
        .card-content { padding: 15px; }
        .badge { font-size: 0.55rem; font-weight: 900; text-transform: uppercase; padding: 4px 10px; border-radius: 4px; margin-bottom: 8px; display: inline-block; color: #fff; }
        .headline { font-size: 1rem; font-weight: 700; line-height: 1.4; color: #eee; margin: 0; }

        /* 👮 Police Portal Box */
        .police-box { background: linear-gradient(45deg, #1a237e, #0d47a1); border: 1px solid #3f51b5; padding: 15px; border-radius: 12px; margin-bottom: 20px; text-align: center; display: none; }
        .police-btn { background: #fff; color: #1a237e; padding: 10px 20px; border-radius: 5px; text-decoration: none; font-weight: 900; font-size: 0.8rem; display: inline-block; margin-top: 10px; }

        /* Bottom Tab Bar */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; display: grid; grid-template-columns: repeat(4, 1fr); padding: 15px 0; border-top: 1px solid #222; z-index: 4000; }
        .nav-item { text-align: center; font-size: 0.65rem; font-weight: 900; color: #666; text-decoration: none; }
        
        #sentinel { height: 50px; text-align: center; color: #222; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="header"><p class="logo">X<span>TREME</span> HUB</p></div>

<div class="waec-slim" id="waec-bar">
    <div style="display: flex; align-items: center;">
        <span class="waec-tag">WAEC 2026</span>
        <span class="waec-text" id="waec-today">Syncing Timetable...</span>
    </div>
    <span style="color: #ffca00;">● LIVE</span>
</div>

<div class="cat-bar">
    <div class="cat active" onclick="filterX('all', this)">LATEST</div>
    <div class="cat" onclick="filterX('WRESTLE', this)">WRESTLING</div>
    <div class="cat" onclick="filterX('NEWS', this)">NG NEWS</div>
    <div class="cat" onclick="filterX('POLICE', this)">NPF PORTAL</div>
    <div class="cat" onclick="filterX('SECURITY', this)">SECURITY</div>
</div>

<div class="container">
    <div class="police-box" id="npf-section">
        <h3 style="margin:0; font-size:1.1rem;">🇳🇬 NPF RECRUITMENT PORTAL</h3>
        <p style="font-size:0.75rem; opacity:0.8;">Apply or Check Training Status Below</p>
        <a href="https://training.npf.gov.ng/" target="_blank" class="police-btn">OPEN OFFICIAL PORTAL</a>
    </div>

    <div id="xtreme-main"></div>
    <div id="sentinel">...</div>
</div>

<div class="bottom-nav">
    <a href="#" class="nav-item" onclick="location.reload()" style="color:var(--xt-orange)">🏠<br>HOME</a>
    <a href="https://throughalivemedication.com/xhgyimzr4?key=ea45ae348b5b66abc7f9c78cb4a8bde7" target="_blank" class="nav-item" style="color: #ffd700;">💰<br>EARN</a>
    <a href="https://training.npf.gov.ng/" target="_blank" class="nav-item">👮<br>NPF</a>
    <a href="https://whatsapp.com/channel/0029VbCJc5k3wtbBwVHEIN2z" target="_blank" class="nav-item" style="color: #25d366;">📢<br>JOIN</a>
</div>

<script>
    // 📅 1. AUTO-UPDATING TIMETABLE
    const timetable = {
        "2026-05-08": "Agric Science (Obj & Essay)",
        "2026-05-09": "Weekend: No Papers Today",
        "2026-05-11": "General Mathematics (Paper 1 & 2)",
        "2026-05-12": "Physics (Practical)",
        "2026-05-13": "English Language (Paper 1, 2 & 3)",
        "2026-05-14": "Biology (Obj & Essay)"
    };

    function updateTimetable() {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('waec-today').innerText = timetable[today] || "No exams today. Prepare for Monday!";
    }

    // 🚀 2. THE MULTI-SOURCE CORS ENGINE
    const xtSources = [
        { name: "WRESTLE GIST", type: "WRESTLE", color: "#d90429", url: "https://www.wrestleview.com/feed/" },
        { name: "DAILY POST", type: "NEWS", color: "#ffc107", url: "https://dailypost.ng/feed/" },
        { name: "NPF UPDATES", type: "POLICE", color: "#1a237e", url: "https://prnigeria.com/category/news/police-news/feed/" },
        { name: "SECURITY", type: "SECURITY", color: "#6c757d", url: "https://prnigeria.com/category/news/feed/" },
        { name: "WAEC NEWS", type: "WAEC", color: "#0047ba", url: "https://myschool.ng/news/rss" }
    ];

    let allItems = [];
    let pointer = 0;
    let perPage = 12;
    let currentFilter = 'all';

    async function initXtreme() {
        updateTimetable();
        const api = "https://api.rss2json.com/v1/api.json?rss_url=";
        
        for (const s of xtSources) {
            try {
                const res = await fetch(api + encodeURIComponent(s.url));
                const data = await res.json();
                if (data.status === 'ok') {
                    data.items.forEach(item => {
                        item.xtSrc = s.name;
                        item.xtType = s.type;
                        item.xtColor = s.color;
                        allItems.push(item);
                    });
                    if (pointer === 0) renderFeed();
                }
            } catch (e) { }
        }
        allItems.sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));
    }

    function renderFeed() {
        const target = currentFilter === 'all' ? allItems : allItems.filter(i => i.xtType === currentFilter);
        const nextBatch = target.slice(pointer, pointer + perPage);
        const main = document.getElementById('xtreme-main');

        nextBatch.forEach(a => {
            let thumb = a.thumbnail || "";
            if (!thumb && a.description) {
                const imgMatch = a.description.match(/<img[^>]+src="([^">]+)"/);
                if (imgMatch) thumb = imgMatch[1];
            }
            let media = thumb ? `<img src="${thumb}" loading="lazy" style="width:100%; height:200px; object-fit:cover;">` : '<div style="height:5px; background:var(--xt-orange); opacity:0.1;"></div>';

            main.innerHTML += `
                <div class="feed-item" style="border-left: 4px solid ${a.xtColor}">
                    <a href="${a.link}" target="_blank" style="text-decoration:none; color:inherit;">
                        ${media}
                        <div class="card-content">
                            <span class="badge" style="background:${a.xtColor}">${a.xtSrc}</span>
                            <p class="headline">${a.title}</p>
                        </div>
                    </a>
                </div>`;
        });
        pointer += perPage;
    }

    // Infinite Scroll
    window.onscroll = function() {
        if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 800) {
            renderFeed();
        }
    };

    function filterX(type, btn) {
        document.querySelectorAll('.cat').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = type;
        pointer = 0;
        
        // Contextual UI Toggles
        document.getElementById('npf-section').style.display = (type === 'POLICE' || type === 'all') ? 'block' : 'none';
        document.getElementById('waec-bar').style.display = (type === 'all') ? 'flex' : 'none';
        
        document.getElementById('xtreme-main').innerHTML = '';
        renderFeed();
    }

    initXtreme();
</script>

<script src="https://throughalivemedication.com/53/26/fa/5326facdec20ef14f35719252a7d6a4d.js"></script>

</body>
</html>
